server:
  port: 8080

spring:
  application:
    name: gymtracker

  datasource:
    url: jdbc:mysql://localhost:3306/gymtracker?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate.hbm2ddl.import_files: ""
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true