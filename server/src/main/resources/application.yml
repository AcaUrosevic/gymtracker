server:
  port: 8080

spring:
  application:
    name: gymtracker

  datasource:
    url: jdbc:mysql://localhost:3306/gymtracker?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate.hbm2ddl.import_files: ""
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true

app:
  jwt:
    secret: "a3a1f07a1c6b4d298b0cf5de14b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f70819"
    expiration: 3600000
